<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chastagner Location SAV — GMAO</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#f0efe9;--bg1:#fff;--bg2:#f7f6f0;
  --txt:#1a1a18;--txt2:#6b7280;--txt3:#b0afaa;
  --bdr:#e4e3db;--bdr2:#d0cfc7;
  --blue:#2563eb;--bluebg:#eff6ff;--bluetxt:#1e40af;
  --red:#dc2626;--redbg:#fef2f2;--redtxt:#991b1b;
  --amber:#d97706;--amberbg:#fffbeb;--ambertxt:#92400e;
  --green:#16a34a;--greenbg:#f0fdf4;--greentxt:#166534;
  --orange:#ea580c;--orangebg:#fff7ed;--orangetxt:#9a3412;
  --purple:#7c3aed;--purplebg:#f5f3ff;--purpletxt:#5b21b6;
  --cyan:#0891b2;--cyanbg:#ecfeff;--cyantxt:#164e63;
  --r:8px;--rl:12px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);font-size:13px;height:100vh;overflow:hidden;}
.app{display:flex;height:100vh;}
.sb{width:220px;min-width:220px;background:var(--bg1);border-right:1px solid var(--bdr);display:flex;flex-direction:column;}
.sb-brand{padding:14px 16px;border-bottom:1px solid var(--bdr);}
.sb-name{font-size:13px;font-weight:800;}
.sb-sub{font-size:10px;color:var(--txt2);margin-top:2px;text-transform:uppercase;letter-spacing:.4px;}
.sb-nav{flex:1;padding:8px;overflow-y:auto;}
.sb-sec{font-size:9px;font-weight:800;color:var(--txt3);text-transform:uppercase;letter-spacing:.8px;padding:10px 8px 3px;}
.ni{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--txt2);margin-bottom:1px;font-weight:500;}
.ni:hover,.ni.on{background:var(--bg2);color:var(--txt);}
.ni.on{font-weight:700;}
.ni-dot{width:6px;height:6px;border-radius:50%;background:var(--bdr2);flex-shrink:0;}
.ni.on .ni-dot{background:var(--blue);}
.sb-user{padding:12px 14px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:10px;}
.av{width:32px;height:32px;border-radius:50%;background:var(--bluebg);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--bluetxt);flex-shrink:0;}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;}
.topbar{background:var(--bg1);border-bottom:1px solid var(--bdr);padding:10px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;}
.topbar-title{font-size:14px;font-weight:800;}
.topbar-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ct{flex:1;overflow-y:auto;padding:14px 18px;}
/* BUTTONS */
.bp{background:var(--blue);color:#fff;border:none;padding:7px 14px;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;}
.bp:hover{background:#1d4ed8;}
.bp:disabled{background:var(--txt3);cursor:not-allowed;opacity:.6;}
.bs{background:var(--bg1);border:1px solid var(--bdr2);padding:6px 11px;border-radius:var(--r);font-size:11px;color:var(--txt2);cursor:pointer;font-weight:500;}
.bs:hover{background:var(--bg2);}
.bd{background:var(--red);color:#fff;border:none;padding:6px 11px;border-radius:var(--r);font-size:11px;font-weight:700;cursor:pointer;}
.bg-btn{background:var(--green);color:#fff;border:none;padding:5px 9px;border-radius:var(--r);font-size:11px;font-weight:700;cursor:pointer;}
.bg-btn:disabled{background:var(--txt3);cursor:not-allowed;}
.src{border:1px solid var(--bdr2);border-radius:var(--r);padding:6px 10px;font-size:12px;background:var(--bg2);color:var(--txt);width:180px;outline:none;}
.src:focus{border-color:var(--blue);background:var(--bg1);}
/* KPI */
.kg{display:grid;gap:10px;margin-bottom:14px;}
.kp{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--rl);padding:13px 15px;border-left:3px solid;}
.kp-l{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:.4px;font-weight:600;margin-bottom:4px;}
.kp-v{font-size:20px;font-weight:800;line-height:1;}
.kp-s{font-size:10px;margin-top:4px;color:var(--txt3);}
/* CARD */
.card{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--rl);margin-bottom:12px;overflow:hidden;}
.ch{padding:10px 14px 8px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;}
.ct2{font-size:12px;font-weight:700;}
.cc{font-size:11px;color:var(--txt2);}
.tw{overflow-x:auto;}
.tbl{width:100%;border-collapse:collapse;min-width:500px;}
.tbl th{text-align:left;padding:7px 11px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--txt2);border-bottom:1px solid var(--bdr);background:var(--bg2);white-space:nowrap;}
.tbl td{padding:7px 11px;border-bottom:1px solid #f4f3ee;vertical-align:middle;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr:hover td{background:#faf9f5;}
/* BADGE */
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700;white-space:nowrap;}
.b-red{background:var(--redbg);color:var(--redtxt);}
.b-amber{background:var(--amberbg);color:var(--ambertxt);}
.b-orange{background:var(--orangebg);color:var(--orangetxt);}
.b-green{background:var(--greenbg);color:var(--greentxt);}
.b-blue{background:var(--bluebg);color:var(--bluetxt);}
.b-gray{background:var(--bg2);color:var(--txt2);}
.b-purple{background:var(--purplebg);color:var(--purpletxt);}
.b-cyan{background:var(--cyanbg);color:var(--cyantxt);}
/* PRIORITY */
.pb{display:flex;align-items:center;gap:5px;}
.pb-t{width:44px;height:4px;background:#eee;border-radius:99px;overflow:hidden;}
.pb-f{height:100%;border-radius:99px;}
/* CHIPS */
.chips{display:flex;flex-wrap:wrap;gap:6px;padding:10px 14px;}
.chip{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:99px;font-size:11px;font-weight:600;border:1px solid;}
/* FILTERS */
.filter-bar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:10px 14px;border-bottom:1px solid var(--bdr);background:var(--bg2);}
.filter-bar select,.filter-bar input{border:1px solid var(--bdr2);border-radius:var(--r);padding:5px 9px;font-size:11px;background:var(--bg1);color:var(--txt);outline:none;}
.filter-bar select:focus,.filter-bar input:focus{border-color:var(--blue);}
.filter-label{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;}
/* CHARTS */
.chart-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.chart-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px;}
.chart-box{background:var(--bg1);border:1px solid var(--bdr);border-radius:var(--rl);padding:14px;}
.chart-title{font-size:11px;font-weight:700;margin-bottom:10px;color:var(--txt);}
.donut-wrap{display:flex;align-items:center;gap:14px;}
.donut-legend{display:flex;flex-direction:column;gap:5px;}
.dl-item{display:flex;align-items:center;gap:6px;font-size:11px;}
.dl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.bc-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.bc-lbl{font-size:11px;color:var(--txt2);width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bc-track{flex:1;height:16px;background:var(--bg2);border-radius:4px;overflow:hidden;position:relative;}
.bc-fill{height:100%;border-radius:4px;}
.bc-val{position:absolute;right:5px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:#fff;}
/* PERIOD TABS */
.period-tabs{display:flex;gap:0;border-bottom:1px solid var(--bdr);margin-bottom:12px;}
.ptab{padding:7px 14px;font-size:11px;cursor:pointer;color:var(--txt2);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;}
.ptab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:700;}
/* PLANNING */
.plan-grid{display:grid;gap:0;}
.plan-header{display:flex;background:var(--bg2);border-bottom:1px solid var(--bdr);}
.plan-tech-col{width:130px;min-width:130px;padding:8px 10px;font-size:10px;font-weight:700;color:var(--txt2);border-right:1px solid var(--bdr);}
.plan-day{flex:1;padding:6px 4px;font-size:10px;font-weight:700;color:var(--txt2);text-align:center;border-right:1px solid var(--bdr);}
.plan-day.today{background:var(--bluebg);color:var(--bluetxt);}
.plan-row{display:flex;border-bottom:1px solid var(--bdr);min-height:52px;}
.plan-tech{width:130px;min-width:130px;padding:8px 10px;font-size:11px;font-weight:700;border-right:1px solid var(--bdr);display:flex;align-items:center;}
.plan-cell{flex:1;border-right:1px solid var(--bdr);padding:3px;position:relative;min-height:52px;}
.plan-event{border-radius:5px;padding:3px 6px;font-size:10px;font-weight:600;margin-bottom:2px;cursor:pointer;line-height:1.3;}
.plan-week-nav{display:flex;align-items:center;gap:8px;}
/* AUTOCOMPLETE */
.acw{position:relative;}
.acd{position:absolute;top:100%;left:0;right:0;background:var(--bg1);border:1px solid var(--bdr2);border-top:none;border-radius:0 0 var(--r) var(--r);z-index:30;max-height:180px;overflow-y:auto;display:none;box-shadow:0 4px 10px rgba(0,0,0,.08);}
.acd.show{display:block;}
.aci{padding:7px 10px;cursor:pointer;font-size:12px;border-bottom:1px solid #f4f3ee;}
.aci:hover{background:var(--bg2);}
/* PIECES */
.ptags{min-height:26px;margin-bottom:7px;display:flex;flex-wrap:wrap;gap:4px;}
.ptag{display:inline-flex;align-items:center;background:var(--bluebg);color:var(--bluetxt);border-radius:99px;padding:3px 9px;font-size:11px;font-weight:600;}
.ptag-rm{cursor:pointer;margin-left:4px;opacity:.5;font-size:14px;line-height:1;}
.ptag-rm:hover{opacity:1;}
/* DEVIS */
.dv-sec{background:var(--bg2);border-radius:var(--r);padding:12px;margin-bottom:10px;}
.dv-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-bottom:9px;color:var(--txt2);}
.dv-line{display:flex;align-items:center;gap:5px;margin-bottom:6px;}
.dv-line input,.dv-line select{border:1px solid var(--bdr2);border-radius:6px;padding:5px 7px;font-size:12px;background:var(--bg1);color:var(--txt);outline:none;font-family:inherit;}
.dv-line input:focus,.dv-line select:focus{border-color:var(--blue);}
.dv-desc{flex:1;min-width:0;}
.dv-qty{width:55px;}
.dv-pu{width:80px;}
.dv-tech-sel{width:130px;}
.dv-hours{width:60px;}
.dv-rate{width:75px;}
.dv-tot{width:80px;text-align:right;font-weight:700;font-size:12px;}
.dv-rm{cursor:pointer;color:var(--red);font-size:17px;line-height:1;background:none;border:none;opacity:.6;}
.dv-rm:hover{opacity:1;}
.vgp-box{display:flex;align-items:center;gap:10px;padding:9px 11px;background:var(--cyanbg);border:1px solid rgba(8,145,178,.2);border-radius:var(--r);margin-bottom:10px;}
/* VGP RELANCE */
.vgp-alert{background:var(--amberbg);border-left:3px solid var(--amber);border-radius:var(--r);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;}
/* MODAL */
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;align-items:center;justify-content:center;}
.ov.show{display:flex;}
.modal{background:var(--bg1);border-radius:14px;width:min(680px,96vw);max-height:92vh;overflow-y:auto;border:1px solid var(--bdr2);}
.mh{padding:14px 17px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg1);z-index:2;}
.mh-t{font-size:14px;font-weight:700;}
.mx{background:none;border:none;font-size:22px;cursor:pointer;color:var(--txt2);line-height:1;}
.mb{padding:16px;}
.mf{padding:11px 16px;border-top:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center;position:sticky;bottom:0;background:var(--bg1);}
.mf-r{display:flex;gap:8px;}
.mtabs{display:flex;border-bottom:1px solid var(--bdr);margin-bottom:14px;}
.mtab{padding:8px 14px;font-size:12px;cursor:pointer;color:var(--txt2);border-bottom:2px solid transparent;margin-bottom:-1px;font-weight:500;}
.mtab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:700;}
.tab-pane{display:none;}
.tab-pane.show{display:block;}
/* FORM */
.fg{margin-bottom:12px;}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.fl{font-size:10px;font-weight:700;color:var(--txt2);text-transform:uppercase;letter-spacing:.3px;display:block;margin-bottom:4px;}
.fi{width:100%;border:1px solid var(--bdr2);border-radius:var(--r);padding:7px 9px;font-size:12px;background:var(--bg1);color:var(--txt);outline:none;font-family:inherit;}
.fi:focus{border-color:var(--blue);}
textarea.fi{resize:vertical;}
.id-bdg{display:inline-block;background:var(--bg2);border:1px solid var(--bdr2);border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700;color:var(--txt2);margin-left:7px;font-family:monospace;}
/* PAGER */
.pager{display:flex;align-items:center;gap:4px;padding:9px 12px;border-top:1px solid var(--bdr);background:var(--bg2);flex-wrap:wrap;}
.pg{padding:4px 8px;border-radius:5px;border:1px solid var(--bdr2);background:var(--bg1);cursor:pointer;font-size:11px;color:var(--txt2);}
.pg:hover,.pg.on{background:var(--blue);color:#fff;border-color:var(--blue);}
.pg-info{font-size:11px;color:var(--txt2);margin-left:auto;}
.conf{background:var(--redbg);border:1px solid #fca5a5;border-radius:var(--r);padding:11px;margin-top:10px;font-size:12px;color:var(--redtxt);}
/* SETTINGS */
.perm-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:7px;}
.perm-item{display:flex;align-items:center;gap:6px;font-size:12px;}
/* KPI ANALYTICS */
.kpi-trend{display:flex;align-items:center;gap:4px;font-size:10px;margin-top:3px;}
.trend-up-good{color:var(--green);}
.trend-down-bad{color:var(--red);}
.trend-neutral{color:var(--txt2);}
.sparkbar{display:flex;align-items:flex-end;gap:3px;height:36px;}
.sbar{flex:1;background:var(--blue);border-radius:2px 2px 0 0;opacity:.75;min-width:6px;}
</style>

function showLoginOverlay(msg){
  var ov=document.getElementById('login-overlay');
  if(ov)ov.style.display='flex';
  var err=document.getElementById('login-error');
  if(err){err.style.display=msg?'block':'none';err.textContent=msg||'';}
  var em=document.getElementById('login-email');if(em)em.value='';
  var ps=document.getElementById('login-pass');if(ps)ps.value='';
}

function hideLoginOverlay(){
  var ov=document.getElementById('login-overlay');
  if(ov)ov.style.display='none';
}

async function doLogin(){
  if(!supa){showLoginOverlay('Erreur : bibliothèque Supabase non chargée. Vérifiez votre connexion internet.');return;}
  var email=(document.getElementById('login-email')||{}).value||'';
  var pass=(document.getElementById('login-pass')||{}).value||'';
  if(!email||!pass){showLoginOverlay('Veuillez remplir tous les champs.');return;}
  var btn=document.getElementById('login-btn');
  var ldg=document.getElementById('login-loading');
  if(btn)btn.disabled=true;
  if(ldg)ldg.style.display='block';
  var result=await supa.auth.signInWithPassword({email:email,password:pass});
  if(result.error){
    if(btn)btn.disabled=false;
    if(ldg)ldg.style.display='none';
    showLoginOverlay('Erreur : '+result.error.message);
  } else {
    try {
      await loadFromSupabase();
      hideLoginOverlay();
      var user = result.data && result.data.user ? result.data.user : null;
      if(user) {
        var nom = (user.user_metadata && user.user_metadata.full_name) || user.email || '?';
        var initiales = nom.split(' ').map(function(w){return w[0]||'';}).slice(0,2).join('').toUpperCase() || '?';
        var sbName = document.getElementById('sb-name');
        var sbAv = document.getElementById('sb-av');
        var sbRole = document.getElementById('sb-role');
        if(sbName) sbName.textContent = nom;
        if(sbAv) sbAv.textContent = initiales;
        var localUser = (USERS||[]).find(function(u){return u.email===user.email || u.username===user.email;});
        if(localUser) {
          CURRENT_USER = localUser;
          if(sbRole) sbRole.textContent = (ROLES[localUser.role]||{label:localUser.role}).label || localUser.role;
        } else {
          /* Utilisateur Supabase mais pas encore dans USERS locaux — créateur par défaut */
          CURRENT_USER = {id:0, nom:nom, email:user.email, role:'createur'};
          if(sbRole) sbRole.textContent = 'Créateur';
        }
      }
      applySidebarPerms();
      draw(PAGE,'');
    } catch(err) {
      if(btn)btn.disabled=false;
      if(ldg)ldg.style.display='none';
      showLoginOverlay('Erreur après connexion : '+(err.message||err));
    }
  }
}

async function doLogout(){
  await supa.auth.signOut();
  draw('dashboard','');
  showLoginOverlay();
}

async function sbLoad(table){
  var r=await supa.from(table).select('*').order('id');
  if(r.error){console.error(table,r.error);return[];}
  return r.data||[];
}

async function sbInsert(table,obj){
  var c=Object.assign({},obj);delete c.id;delete c.created_at;delete c.updated_at;
  var r=await supa.from(table).insert(c).select().single();
  if(r.error){console.error('insert',table,r.error);return null;}
  return r.data;
}

async function sbUpdate(table,id,obj){
  var c=Object.assign({},obj);delete c.id;delete c.created_at;delete c.updated_at;
  var r=await supa.from(table).update(c).eq('id',id).select().single();
  if(r.error){console.error('update',table,r.error);return null;}
  return r.data;
}

async function sbDelete(table,id){
  var r=await supa.from(table).delete().eq('id',id);
  if(r.error){console.error('delete',table,r.error);}
}

async function loadFromSupabase(){
  var results=await Promise.all([
    sbLoad('interventions'),sbLoad('historique'),sbLoad('materiels'),
    sbLoad('clients'),sbLoad('techniciens'),sbLoad('stock')
  ]);
  var def=buildDefaults();
  /* Use Supabase data if available, else use demo defaults */
  D.interventions  = results[0].length ? results[0] : (D.interventions||def.interventions);
  D.historique     = results[1].length ? results[1] : (D.historique||def.historique);
  D.materiels      = results[2].length ? results[2] : (D.materiels||def.materiels);
  D.clients        = results[3].length ? results[3] : (D.clients||def.clients);
  D.techniciens    = results[4].length ? results[4] : (D.techniciens||def.techniciens);
  D.stock          = results[5].length ? results[5] : (D.stock||def.stock);
  syncMatStatut();
}

    var saved=await sbUpdate(table,obj.id,obj);
    if(saved)obj.id=saved.id;
  } else {
    var saved=await sbInsert(table,obj);

  }
}
function syncMatStatut(){
  var mapActif={'En cours':'En cours','En attente':"En attente d'acceptation",'Devis fait':'Devis fait'};
  D.materiels.forEach(function(m){m.statut='';});
  (D.interventions||[]).forEach(function(i){
    if(!i.serie)return;var ms=mapActif[i.statut];if(!ms)return;
    var mat=D.materiels.find(function(m){return m.serie===i.serie;});if(mat)mat.statut=ms;
  });
}

function wdBetween(d1,d2){if(!d1||!d2)return 0;var a=new Date(d1),b=new Date(d2);if(b<=a)return 0;var c=0,cur=new Date(a);while(cur<b){cur.setDate(cur.getDate()+1);var w=cur.getDay();if(w!==0&&w!==6)c++;}return c;}
function wdUntil(ds){if(!ds)return null;var now=new Date();now.setHours(0,0,0,0);var end=new Date(ds);end.setHours(0,0,0,0);if(end<=now)return 0;return wdBetween(now.toISOString().split('T')[0],ds);}

function durText(i){if(!i.date_debut)return '—';var d2s=i.date_cloture||i.date_fin;if(!d2s)return '—';var t1=i.heure_debut||'08:00',t2=i.date_cloture?(i.heure_cloture||'17:00'):(i.heure_fin||'17:00');var d1dt=new Date(i.date_debut+'T'+t1),d2dt=new Date(d2s+'T'+t2);var diff=d2dt-d1dt;if(diff<=0)return '0h';var totalH=Math.floor(diff/(1000*60*60)),j=Math.floor(totalH/24),h=totalH%24;if(j===0)return h+'h';if(h===0)return j+' j.';return j+' j. '+h+'h';}

function avgDurText(m){if(!m)return '—';var d=Math.floor(m/1440),h=Math.floor((m%1440)/60),mn=Math.round(m%60);if(d>0&&h>0)return d+' j. '+h+'h';if(d>0)return d+' j.';if(h>0)return h+'h';return mn+'min';}

function dvTotal(dv){
  if(!dv)return{ht:0,tva:0,ttc:0};
  var ht=0;
  (dv.lignes_pieces||[]).forEach(function(l){ht+=Number(l.qte||0)*Number(l.pu||0);});
  (dv.mo||[]).forEach(function(l){ht+=Number(l.heures||0)*Number(l.taux||0);});
  var t=ht*(Number(dv.tva||20)/100);
  return{ht:Math.round(ht*100)/100,tva:Math.round(t*100)/100,ttc:Math.round((ht+t)*100)/100};
}
/* Only count CA if devis Accepté and NOT Annulé/Refusé */
function dvCA(i){
  if(i.statut==='Annulé')return 0;
  if(!i.devis||i.devis.statut==='Refusé')return 0;
  if(i.devis.statut==='Accepté')return dvTotal(i.devis).ttc;
  return 0;
}

/* Can close: all fields filled + devis Accepté or Refusé */
function canClose(i){
  if(!i.technicien||!i.article||!i.serie||!i.client||!i.date_debut||!i.date_fin)return false;
  if(!i.devis||!i.devis.statut)return false;
  return i.devis.statut==='Accepté'||i.devis.statut==='Refusé';
}
function closeBlockReason(i){
  if(!i.technicien)return 'Technicien non assigné';

}

/* VGP relances - only if within 30 days (1 month) */
function getVGPRelances(){
  var res=[];
  (D.historique||[]).forEach(function(i){
    if(i.devis&&i.devis.vgp&&i.date_cloture){
      var rd=new Date(i.date_cloture);rd.setMonth(rd.getMonth()+6);
      var rs=rd.toISOString().split('T')[0];
      var dl=wdUntil(rs);
      var calDl=calBetween(todayStr(),rs);
      if(calDl<=30){res.push({inter:i,relanceDate:rs,daysLeft:dl,calDays:calDl});}
    }
  });
  return res;
}

function filterByPeriod(arr,period,dateField){
  var now=new Date();
  return arr.filter(function(i){
    if(!i[dateField])return false;
    var d=new Date(i[dateField]);
    if(period==='month')return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(period==='quarter'){var q=Math.floor(now.getMonth()/3);return Math.floor(d.getMonth()/3)===q&&d.getFullYear()===now.getFullYear();}
    if(period==='year')return d.getFullYear()===now.getFullYear();
    return true;
  });
}

function calcStockKPIs(){var sk={rupture:0,alerte:0,tauxRupture:0,valeur:0,top5:[],avgDelai:7,nbCmds:0,interBloquees:0,tauxDispo:100};var st=D.stock||[];var tot=st.length;if(!tot)return sk;sk.rupture=st.filter(function(s){return s.qte===0;}).length;sk.alerte=st.filter(function(s){return s.qte>0&&s.qte<=s.qte_min;}).length;sk.tauxRupture=Math.round((sk.rupture+sk.alerte)/tot*100);sk.valeur=st.reduce(function(a,s){return a+s.qte*s.prix;},0);var pc={};var ai=(D.interventions||[]).concat(D.historique||[]);ai.forEach(function(i){(i.pieces||[]).forEach(function(p){var k=p.toLowerCase().trim();pc[k]=(pc[k]||0)+1;});if(i.devis&&i.devis.lignes_pieces)i.devis.lignes_pieces.forEach(function(l){var k=(l.desc||'').toLowerCase().trim();if(k)pc[k]=(pc[k]||0)+(l.qte||1);});});sk.top5=Object.keys(pc).map(function(k){return{nom:k,count:pc[k]};}).sort(function(a,b){return b.count-a.count;}).slice(0,5);var wd=st.filter(function(s){return s.delai_reappro>0;});sk.avgDelai=wd.length?Math.round(wd.reduce(function(a,s){return a+(s.delai_reappro||7);},0)/wd.length):7;sk.nbCmds=st.reduce(function(a,s){return a+(s.nb_commandes||0);},0);sk.interBloquees=(D.interventions||[]).filter(function(i){return i.statut==='En attente'&&(!i.pieces||!i.pieces.length)&&(!i.devis||!i.devis.lignes_pieces||!i.devis.lignes_pieces.length);}).length;var iwp=ai.filter(function(i){return(i.pieces&&i.pieces.length)||(i.devis&&i.devis.lignes_pieces&&i.devis.lignes_pieces.length);}).length;sk.tauxDispo=ai.length?Math.round(iwp/ai.length*100):100;return sk;}
function calcKPIs(period){
  period=period||'all';
  var hist=D.historique||[];
  var allInter=D.interventions.concat(hist);
  /* Filter by period for analytics */
  var histP=period==='all'?hist:filterByPeriod(hist,period,'date_cloture');
  /* MTTR */
  var done=histP.filter(function(i){return i.statut==='Terminé'&&i.date_debut&&i.date_fin;});
  /* MTTR: from date_debut to date_cloture (actual closure) */
  var mttr=done.length?Math.round(done.reduce(function(a,i){return a+calBetween(i.date_debut,i.date_cloture||i.date_fin);},0)/done.length*10)/10:0;
  /* Avg intervention time in calendar days */
  /* avgTime: from date_debut to date_cloture (actual closure date) */
  var avgTime=done.length?Math.round(done.reduce(function(a,i){return a+calBetween(i.date_debut,i.date_cloture||i.date_fin);},0)/done.length):0;
  /* Overdue */
  var overdue=D.interventions.filter(function(i){var p=getPrio(i);return p.wd!==null&&p.wd<=0;}).length;
  /* Top machines (series) en panne in historique */
  var serieCnt={};
  hist.filter(function(i){return i.statut==='Terminé';}).forEach(function(i){if(i.serie)serieCnt[i.serie]=(serieCnt[i.serie]||0)+1;});
  var topMachines=Object.entries(serieCnt).sort(function(a,b){return b[1]-a[1];}).slice(0,5).map(function(e){
    var mat=D.materiels.find(function(m){return m.serie===e[0];})||{};
    return{serie:e[0],article:mat.article||e[0],count:e[1]};
  });
  /* CA - only accepted, not annulé */
  var totalCA=histP.reduce(function(a,i){return a+dvCA(i);},0);
  /* Devis acceptance */
  var avecDv=allInter.filter(function(i){return i.devis&&i.devis.statut;});
  var acc=avecDv.filter(function(i){return i.devis.statut==='Accepté';});
  var tauxA=avecDv.length?Math.round(acc.length/avecDv.length*100):0;
  /* By tech */
  var byTech={};D.interventions.forEach(function(i){if(i.technicien)byTech[i.technicien]=(byTech[i.technicien]||0)+1;});
  /* By statut */
  var byStat={'En cours':0,'En attente':0,'Devis fait':0};
  D.interventions.forEach(function(i){byStat[i.statut]=(byStat[i.statut]||0)+1;});
  /* Monthly closures (last 6 months) */
  var monthly=[];
  var now=new Date();
  for(var m=5;m>=0;m--){
    var dt=new Date(now.getFullYear(),now.getMonth()-m,1);
    var ks=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
    var cnt=hist.filter(function(i){return i.statut==='Terminé'&&i.date_cloture&&i.date_cloture.startsWith(ks);}).length;
    var ca=hist.filter(function(i){return i.date_cloture&&i.date_cloture.startsWith(ks);}).reduce(function(a,i){return a+dvCA(i);},0);
    monthly.push({label:String(dt.getMonth()+1)+'/'+String(dt.getFullYear()).slice(2),cnt:cnt,ca:Math.round(ca)});
  }
  return{mttr:mttr,avgTime:avgTime,overdue:overdue,topMachines:topMachines,totalCA:Math.round(totalCA),tauxA:tauxA,byTech:byTech,byStat:byStat,monthly:monthly,totalHist:hist.length,totalInter:D.interventions.length,histP:histP,done:done};
}

function donutSVG(slices,cx,cy,R,ring,centerTxt,centerSub){
  /* slices: [{pct, color}] */
  var total=slices.reduce(function(a,s){return a+s.pct;},0);
  if(!total)return'<svg width="130" height="130" viewBox="0 0 130 130"><circle cx="65" cy="65" r="'+(R-ring/2)+'" fill="none" stroke="#eee" stroke-width="'+ring+'"/><text x="65" y="60" text-anchor="middle" style="font-size:16px;font-weight:800;fill:var(--txt)">'+escH(centerTxt)+'</text><text x="65" y="76" text-anchor="middle" style="font-size:10px;fill:var(--txt2)">'+escH(centerSub)+'</text></svg>';
  var paths='',cum=0;
  slices.forEach(function(s){
    var pct=s.pct/total;
    var start=cum*2*Math.PI-Math.PI/2,end=(cum+pct)*2*Math.PI-Math.PI/2;
    var r=R-ring/2;
    var x1=cx+r*Math.cos(start),y1=cy+r*Math.sin(start);
    var x2=cx+r*Math.cos(end),y2=cy+r*Math.sin(end);
    var large=pct>0.5?1:0;
    if(pct>0.999)paths+='<circle cx="'+cx+'" cy="'+cy+'" r="'+r+'" fill="none" stroke="'+s.color+'" stroke-width="'+ring+'"/>';
    else if(pct>0)paths+='<path d="M '+x1+' '+y1+' A '+r+' '+r+' 0 '+large+' 1 '+x2+' '+y2+'" fill="none" stroke="'+s.color+'" stroke-width="'+ring+'"/>';
    cum+=pct;
  });
  return'<svg width="130" height="130" viewBox="0 0 130 130">'+paths+'<text x="'+cx+'" y="'+(cy-6)+'" text-anchor="middle" style="font-size:17px;font-weight:800;fill:var(--txt)">'+escH(centerTxt)+'</text><text x="'+cx+'" y="'+(cy+10)+'" text-anchor="middle" style="font-size:10px;fill:var(--txt2)">'+escH(centerSub)+'</text></svg>';
}
function barChartH(items,maxVal,colors){
  /* items: [{label,value,color?}] */
  return items.map(function(it,i){
    var pct=maxVal?Math.round(it.value/maxVal*100):0;

}

function rDash(){

/* Clore: move to historique, only if canClose */
function cloreInter(id){
  var idx=D.interventions.findIndex(function(x){return x.id===id;});if(idx<0)return;
  var i=D.interventions[idx];
  var reason=closeBlockReason(i);
  if(reason){alert('Impossible de clore : '+reason);return;}
  i.statut='Terminé';i.date_cloture=todayStr();
  syncMatStatut();
  D.historique.unshift(i);D.interventions.splice(idx,1);
  (async function(){
    await sbInsert('historique',i);
    await sbDelete('interventions',i.id);
    save();draw(PAGE,LS);
  })();
}

/* ================================================================
   PLANNING VISUEL
================================================================ */
function rPlanning(){
  var today=new Date();today.setHours(0,0,0,0);
  /* Get week start (Monday) + offset */
  var weekStart=new Date(today);
  var dow=weekStart.getDay();var diff=dow===0?-6:1-dow;
  weekStart.setDate(weekStart.getDate()+diff+PLAN_WEEK_OFFSET*7);
  var days=[];for(var d=0;d<7;d++){var dd=new Date(weekStart);dd.setDate(dd.getDate()+d);days.push(dd);}
  var dayNames=['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];
  var eventColors={'En cours':'#2563eb','En attente':'#d97706','Devis fait':'#7c3aed','Terminé':'#16a34a','Annulé':'#dc2626'};
  /* Build header */
  var headerCells=days.map(function(d,i){
    var isToday=d.getTime()===today.getTime();
    var lbl=dayNames[i]+' '+fmtDateShort(d.toISOString().split('T')[0]);
    return'<div class="plan-day'+(isToday?' today':'')+'">'+lbl+'</div>';
  }).join('');
  /* Build rows per technicien */
  var rows=D.techniciens.filter(function(t){return t.statut==='Actif';}).map(function(tech){
    var cells=days.map(function(d){
      var ds=d.toISOString().split('T')[0];
      /* Find interventions for this tech on this day */
      var interv=D.interventions.filter(function(i){
        return i.technicien===tech.nom&&i.date_debut&&i.date_fin&&i.date_debut<=ds&&i.date_fin>=ds;
      });
      var evts=interv.map(function(i){
        var col=eventColors[i.statut]||'#888';
        return'<div class="plan-event" style="background:'+col+'18;border-left:3px solid '+col+';color:'+col+'" onclick="editInter('+i.id+')" title="'+escH(i.article)+' ('+escH(i.serie)+')">'+
          '<div>'+escH(i.article)+'</div>'+
          '<div style="font-size:9px;opacity:.8">'+escH(i.serie)+'</div>'+
        '</div>';
      }).join('');
      return'<div class="plan-cell">'+evts+'</div>';
    }).join('');
    return'<div class="plan-row"><div class="plan-tech">'+escH(tech.nom.split(' ')[0])+'</div>'+cells+'</div>';
  }).join('');
  var weekLabel=fmtDate(weekStart.toISOString().split('T')[0])+' — '+fmtDate(days[6].toISOString().split('T')[0]);
  return'<div class="card"><div class="ch">'+
    '<span class="ct2">Planning semaine du '+weekLabel+'</span>'+
    '<div class="plan-week-nav">'+
      '<button class="bs" onclick="PLAN_WEEK_OFFSET--;draw(\'planning\',\'\')">← Préc.</button>'+
      '<button class="bs" onclick="PLAN_WEEK_OFFSET=0;draw(\'planning\',\'\')">Aujourd\'hui</button>'+
      '<button class="bs" onclick="PLAN_WEEK_OFFSET++;draw(\'planning\',\'\')">Suiv. →</button>'+
    '</div>'+
  '</div>'+
  '<div style="overflow-x:auto">'+
  '<div class="plan-grid" style="min-width:700px">'+
    '<div class="plan-header"><div class="plan-tech-col">Technicien</div>'+headerCells+'</div>'+rows+
  '</div></div>'+
  '<div style="padding:10px 14px;border-top:1px solid var(--bdr);display:flex;gap:12px;flex-wrap:wrap">'+
    Object.entries(eventColors).map(function(e){return'<div style="display:flex;align-items:center;gap:5px;font-size:11px"><div style="width:12px;height:12px;border-radius:2px;background:'+e[1]+'30;border-left:3px solid '+e[1]+'"></div>'+e[0]+'</div>';}).join('')+
  '</div></div>';
}

function delHist(id){
  if(!confirm('Supprimer définitivement cette intervention de l\'historique ?'))return;
  var inter=D.historique.find(function(x){return x.id===id;});
  D.historique=D.historique.filter(function(x){return x.id!==id;});
  /* If no other hist intervention for this serie, reset materiel */
  if(inter&&inter.serie){
    var stillInHist=D.historique.find(function(x){return x.serie===inter.serie;});
    var stillActive=D.interventions.find(function(x){return x.serie===inter.serie;});
    if(!stillInHist&&!stillActive){
      var mat=D.materiels.find(function(m){return m.serie===inter.serie;});
      if(mat)mat.statut='';
    }
  }
  save();draw('historique',LS);
}
function delInter(id){
  if(!confirm('Supprimer définitivement cette intervention ?'))return;
  var inter=D.interventions.find(function(x){return x.id===id;});
  D.interventions=D.interventions.filter(function(x){return x.id!==id;});
  /* Reset materiel statut if no other active intervention for this serie */
  if(inter&&inter.serie){
    var stillActive=D.interventions.find(function(x){return x.serie===inter.serie;});
    if(!stillActive){
      var mat=D.materiels.find(function(m){return m.serie===inter.serie;});
      if(mat)mat.statut='';
    }
  }
  save();draw(PAGE,LS);
}

function makeAC(inpId,dropId,items,onSel){
  var inp=document.getElementById(inpId),drop=document.getElementById(dropId);
  if(!inp||!drop)return;
  inp.addEventListener('input',function(){
    var v=inp.value.toLowerCase();drop.innerHTML='';
    if(!v){drop.classList.remove('show');return;}
    var hits=items.filter(function(x){return x&&x.toLowerCase().indexOf(v)>=0;}).slice(0,15);
    if(!hits.length){drop.classList.remove('show');return;}
    hits.forEach(function(h){var d=document.createElement('div');d.className='aci';d.textContent=h;d.onclick=function(){inp.value=h;drop.classList.remove('show');if(onSel)onSel(h);};drop.appendChild(d);});
    drop.classList.add('show');
  });
  document.addEventListener('click',function(e){if(e.target!==inp&&!drop.contains(e.target))drop.classList.remove('show');});
}

  return DV_P.map(function(l,i){return'<div class="dv-line"><input class="dv-desc" placeholder="Description" value="'+escH(l.desc||'')+'" oninput="DV_P['+i+'].desc=this.value;updateDvTot()"><input class="dv-qty" type="number" min="0" step="1" placeholder="Qté" value="'+Number(l.qte||0)+'" oninput="DV_P['+i+'].qte=parseFloat(this.value)||0;updateDvTot()"><input class="dv-pu" type="number" min="0" step="0.01" placeholder="P.U. €" value="'+Number(l.pu||0)+'" oninput="DV_P['+i+'].pu=parseFloat(this.value)||0;updateDvTot()"><div class="dv-tot">'+eur(Number(l.qte||0)*Number(l.pu||0))+'</div><button class="dv-rm" onclick="DV_P.splice('+i+',1);refreshDvP()">×</button></div>';}).join('');
}
function renderDvMO(){
  if(!DV_MO.length)return'<div style="color:var(--txt3);font-size:11px;margin-bottom:7px">Aucune ligne M.O.</div>';
  return DV_MO.map(function(l,i){return'<div class="dv-line"><input class="dv-desc" placeholder="Description M.O." value="'+escH(l.desc||'')+'" oninput="DV_MO['+i+'].desc=this.value;updateDvTot()"><select class="dv-tech-sel" onchange="DV_MO['+i+'].technicien=this.value"><option value="">— Technicien —</option>'+D.techniciens.map(function(t){return'<option value="'+escH(t.nom)+'"'+(l.technicien===t.nom?' selected':'')+'>'+escH(t.nom)+'</option>';}).join('')+'</select><input class="dv-hours" type="number" min="0" step="0.5" placeholder="h" value="'+Number(l.heures||0)+'" oninput="DV_MO['+i+'].heures=parseFloat(this.value)||0;updateDvTot()"><input class="dv-rate" type="number" min="0" step="0.01" placeholder="€/h" value="'+Number(l.taux||0)+'" oninput="DV_MO['+i+'].taux=parseFloat(this.value)||0;updateDvTot()"><div class="dv-tot">'+eur(Number(l.heures||0)*Number(l.taux||0))+'</div><button class="dv-rm" onclick="DV_MO.splice('+i+',1);refreshDvMO()">×</button></div>';}).join('');
}
function renderDvTot(){
  var ht=0;DV_P.forEach(function(l){ht+=Number(l.qte||0)*Number(l.pu||0);});DV_MO.forEach(function(l){ht+=Number(l.heures||0)*Number(l.taux||0);});
  var tvaEl=document.getElementById('dv-tva');var tvaR=tvaEl?parseFloat(tvaEl.value)||20:20;
  var tva=ht*(tvaR/100),ttc=ht+tva;
  return'<div style="display:flex;justify-content:flex-end;padding:9px 0 0;border-top:1px solid var(--bdr)"><div style="text-align:right"><div style="font-size:12px;color:var(--txt2)">HT : '+eur(Math.round(ht*100)/100)+'</div><div style="font-size:11px;color:var(--txt3)">TVA '+tvaR+'% : '+eur(Math.round(tva*100)/100)+'</div><div style="font-size:18px;font-weight:800;color:var(--blue)">TTC : '+eur(Math.round(ttc*100)/100)+'</div></div></div>';
}
function refreshDvP(){var z=document.getElementById('dvp-list');if(z)z.innerHTML=renderDvP();updateDvTot();}
function refreshDvMO(){var z=document.getElementById('dvm-list');if(z)z.innerHTML=renderDvMO();updateDvTot();}
function updateDvTot(){var z=document.getElementById('dv-tot-zone');if(z)z.innerHTML=renderDvTot();}

/* ================================================================
   SAVE MODAL
================================================================ */
function saveModal(){
  if(MODE==='view'){closeModal();return;}
  if(MODE==='user'){saveUser();return;}
  if(MODE==='inter'){
    var o={id:EID||(nextId('inter')),article:gv('fart-in'),serie:gv('fserie-in'),client:gv('fcli'),statut:gv('fstat'),technicien:gv('ftech'),date_debut:gv('fdeb'),date_fin:gv('dfin'),description:gv('fdesc'),pieces:TMP_PIECES.slice(),devis:collectDevis()};
    if(EID){var i=D.interventions.findIndex(function(x){return x.id===EID;});if(i>=0)D.interventions[i]=o;}else D.interventions.unshift(o);
    syncMatStatut();
    /* → historique only if (Terminé or Annulé) AND devis Accepté or Refusé */
    var dvSettled=o.devis&&(o.devis.statut==='Accepté'||o.devis.statut==='Refusé');
    if((o.statut==='Terminé'||o.statut==='Annulé')&&dvSettled){
      o.date_cloture=o.date_cloture||todayStr();
      if(!D.historique.find(function(h){return h.id===o.id;}))D.historique.unshift(o);
      D.interventions=D.interventions.filter(function(x){return x.id!==o.id;});
    }
  }else if(MODE==='mat'){
    var dmat=EID?D.materiels.find(function(x){return x.id===EID;}):{}; var o={id:EID||(nextId('mat')),article:gv('fart'),serie:gv('fserie'),client:gv('fcli'),marque:gv('fmarq'),technicien:gv('ftech'),statut:(dmat&&dmat.statut)||'',localisation:gv('floc')};
    if(EID){var i=D.materiels.findIndex(function(x){return x.id===EID;});if(i>=0)D.materiels[i]=o;}else D.materiels.push(o);
  }else if(MODE==='cli'){
    var o={id:EID||(nextId('cli')),nom:gv('fnom'),contact:gv('fcontact'),tel:gv('ftel'),email:gv('femail'),adresse:gv('fadr'),notes:gv('fnotes')};
    if(EID){var i=D.clients.findIndex(function(x){return x.id===EID;});if(i>=0)D.clients[i]=o;}else D.clients.push(o);
  }else if(MODE==='tech'){
    var o={id:EID||(nextId('tech')),nom:gv('fnom'),fonction:gv('ffonc'),zone:gv('fzone'),tel:gv('ftel'),email:gv('femail'),statut:gv('fstat')};
    if(EID){var i=D.techniciens.findIndex(function(x){return x.id===EID;});if(i>=0)D.techniciens[i]=o;}else D.techniciens.push(o);
  }else if(MODE==='stock'){
    var o={id:EID||(nextId('stock')),ref:gv('fref'),designation:gv('fdes'),categorie:gv('fcat'),qte:gn('fqte'),qte_min:gn('fmin'),prix:gn('fprix'),fournisseur:gv('ffour'),delai_reappro:gn('fdelai')||7,derniere_commande:gv('fdcmd'),nb_commandes:(EID?((D.stock.find(function(x){return x.id===EID;})||{}).nb_commandes||0):0)};
    if(EID){var i=D.stock.findIndex(function(x){return x.id===EID;});if(i>=0)D.stock[i]=o;}else D.stock.push(o);
  }
  (async function(){
    var tables={inter:'interventions',mat:'materiels',cli:'clients',tech:'techniciens',stock:'stock'};
    var tbl=tables[MODE];
    if(tbl&&o){await saveToSupa(tbl,o);}
    save();closeModal();draw(PAGE,LS);
  })();
}

    draw(PAGE,'');
  } else {
    showLoginOverlay();
    draw(PAGE,'');
  }
  supa.auth.onAuthStateChange(function(event){
    if(event==='SIGNED_OUT'){showLoginOverlay();}
  });
})();
</script>
